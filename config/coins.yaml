# ============================================================
# coins.yaml — Sabit Grid Trading Coin Listesi
# Bu dosyayı düzenleyerek coin ekleyebilir / çıkarabilirsiniz.
# Sıralama tier'ı belirler: ilk 2 = Tier 1, 3-4. = Tier 2, 5. = Tier 3
# ============================================================

grid_coins:
  - BTC/USDC    # Tier 1 — 120 USDC / 10 seviye (12 USDC/seviye)
  - ETH/USDC    # Tier 1 — 120 USDC / 10 seviye (12 USDC/seviye)
  - BNB/USDC    # Tier 2 — 105 USDC /  8 seviye (13 USDC/seviye)
  - SOL/USDC    # Tier 2 — 105 USDC /  8 seviye (13 USDC/seviye)
  - XRP/USDC    # Tier 3 — 150 USDC /  6 seviye (25 USDC/seviye)

# ============================================================
# Tier bütçe dağılımı (600 USDC grid bütçesi üzerinden):
#
#   Tier 1 (rank 0-1, ilk 2 coin) : %40 → 240 USDC toplam
#                                        120 USDC/coin × 10 seviye
#   Tier 2 (rank 2-3, 3-4. coin)  : %35 → 210 USDC toplam
#                                        105 USDC/coin ×  8 seviye
#   Tier 3 (rank 4,   5. coin)    : %25 → 150 USDC toplam
#                                        150 USDC/coin ×  6 seviye
#   Toplam grid bütçesi           : 600 USDC  ✓
# ============================================================

# Fallback (API erişimi yoksa kullanılır)
all_grid_coins:
  - BTC/USDC
  - ETH/USDC
  - BNB/USDC
  - SOL/USDC
  - XRP/USDC
