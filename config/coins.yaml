# ============================================================
# coins.yaml — Grid Trading Coin Allocation
# Dynamic tier allocation based on 24h volume ranking
# ============================================================

# Tier Configuration (automatically applied based on volume rank)
tier_config:
  tier_1:
    name: "Large Cap"
    allocation_pct: 40        # 40% of grid capital (240 USDC)
    grid_levels: 10           # 10 grid levels
    rank_range: [1, 3]        # Top 3 volume pairs
    description: "Highest volume, most stable"

  tier_2:
    name: "Mid Cap"
    allocation_pct: 30        # 30% of grid capital (180 USDC)
    grid_levels: 8            # 8 grid levels
    rank_range: [4, 6]        # Rank 4-6 volume pairs
    description: "Medium volume, moderate volatility"

  tier_3:
    name: "Small Cap"
    allocation_pct: 20        # 20% of grid capital (120 USDC)
    grid_levels: 6            # 6 grid levels
    rank_range: [7, 10]       # Rank 7-10 volume pairs
    description: "Lower volume, higher volatility"

# Note: Coins are selected dynamically by 24h volume from Binance
# The static list below is used as fallback only

# Fallback static list (used if volume fetch fails)
all_grid_coins:
  - BTC/USDC
  - ETH/USDC
  - SOL/USDC
  - BNB/USDC
  - XRP/USDC
  - ADA/USDC
  - AVAX/USDC
  - DOT/USDC
  - DOGE/USDC
  - LINK/USDC

# Screener exclusion (grid coins can also appear in screener)
screener_exclude: []

# Dynamic selection settings
dynamic_selection:
  enabled: true
  top_n: 10                 # Select top 10 by volume
  min_volume_24h: 10000000  # Minimum 10M USDC 24h volume
  update_interval_hours: 2  # Refresh every 2 hours with grid analysis
